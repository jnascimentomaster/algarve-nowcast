<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algarve Economy Nowcast</title>
<meta name="description" content="Real-time GDP nowcast for the Algarve region, Portugal. Sectoral decomposition model using INE official statistics.">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root { --bg:#F7F3EE;--card:#FFFFFF;--border:#E2DCD4;--text:#1A1A1A;--muted:#6B6560;--dim:#9C9590;--accent:#D4553A;--blue:#2563EB;--teal:#0F766E;--gold:#B8860B;--purple:#7C3AED; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Instrument Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',serif}.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:24px;margin-bottom:16px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:13px;font-weight:400;color:var(--muted);background:0;border:0;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit}
.tab.active{font-weight:600;color:var(--accent);border-bottom-color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:22px}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr}}
.kpi-main{border-left:4px solid var(--accent)}
.kpi-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.kpi-value{font-size:44px;color:var(--accent);margin-top:6px;line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border)}
td{padding:9px 8px;border-bottom:1px solid var(--border)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.sector-card{border-left:3px solid var(--dim);margin-bottom:14px}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 20px;font-size:12px}
.sector-grid dt{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.warn-box{margin-top:12px;padding:10px 14px;background:#FEF3CD;border-radius:4px;font-size:12px;color:#856404}
.chart-wrap{position:relative;height:300px;margin-top:12px}.chart-wrap-sm{height:220px}
.hidden{display:none}
footer{margin-top:40px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeUp .4s ease-out both}
</style>
</head>
<body>
<header style="border-bottom:2px solid var(--text);padding:28px 0 18px;margin-bottom:28px">
  <div class="container" style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="serif" style="font-size:28px;font-weight:400;letter-spacing:-0.02em">Algarve Economy Nowcast</h1>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">Sectoral GDP tracking · Algarve, Portugal</p>
    </div>
    <div style="text-align:right">
      <div class="mono" style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em">Updated</div>
      <div class="mono" id="updated-date" style="font-size:13px;color:var(--muted)">—</div>
    </div>
  </div>
</header>
<div class="container">
  <nav class="tabs" id="nav-tabs">
    <button class="tab active" data-tab="overview">Nowcast</button>
    <button class="tab" data-tab="sectors">Sectors</button>
    <button class="tab" data-tab="indicators">Indicators</button>
    <button class="tab" data-tab="method">Methodology</button>
  </nav>
  <div id="tab-overview"><div class="card" style="color:var(--muted)">Loading data…</div></div>
  <div id="tab-sectors" class="hidden"></div>
  <div id="tab-indicators" class="hidden"></div>
  <div id="tab-method" class="hidden"></div>
  <footer><span>Data: INE (Statistics Portugal) · Google Trends</span><span>Algarve Nowcast v3</span></footer>
</div>
<script>
const C={304:'#D4553A',309:'#2563EB',307:'#0F766E',203:'#B8860B',308:'#7C3AED',REST:'#9C9590'};
const L={304:'Trade & Tourism',309:'Public Administration',307:'Real Estate',203:'Construction',308:'Consultancy',REST:'Other Sectors'};
const IL={nights:'Overnight Stays',revpar:'RevPAR (€/night)',al_share:'AL Market Share',building_permits:'Building Permits',airport_pax:'Airport Passengers (Faro)',housing_tx:'Housing Transactions (€k)',unemployment:'Unemployment Rate (%)'};
const IC={nights:'#D4553A',revpar:'#0F766E',al_share:'#7C3AED',building_permits:'#B8860B',airport_pax:'#2563EB',housing_tx:'#0F766E',unemployment:'#D4553A'};
let allCharts={};

function fmt(v){return v>=1000?'€'+(v/1000).toFixed(2)+'B':'€'+Math.round(v)+'M'}
function r2c(v){return v>.8?'var(--teal)':v>.5?'var(--gold)':'var(--accent)'}
function dwc(v){return v>1.5?'var(--teal)':v>.8?'var(--gold)':'var(--accent)'}

document.getElementById('nav-tabs').addEventListener('click',function(e){
  if(!e.target.matches('.tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.classList.add('hidden'));
  document.getElementById('tab-'+e.target.dataset.tab).classList.remove('hidden');
  setTimeout(()=>Object.values(allCharts).forEach(c=>c.resize()),50);
});

fetch('./data.json')
.then(r=>{if(!r.ok)throw new Error('data.json: HTTP '+r.status);return r.json()})
.then(d=>{
  document.getElementById('updated-date').textContent=d.updated;
  buildOverview(d);buildSectors(d);buildIndicators(d);buildMethod();
})
.catch(err=>{
  document.getElementById('tab-overview').innerHTML='<div class="card" style="color:var(--accent)"><h3>Error</h3><p class="mono" style="margin-top:8px;font-size:13px">'+err.message+'</p><p style="margin-top:8px;color:var(--muted);font-size:13px">Check that data.json exists alongside index.html.</p></div>';
});

function buildOverview(d){
  const nc=d.nowcast,sec=d.sectors,diag=d.diagnostics;
  const ss=Object.entries(sec).sort((a,b)=>b[1].point-a[1].point);
  document.getElementById('tab-overview').innerHTML=`
  <div class="kpi-grid fade">
    <div class="card kpi-main"><div class="kpi-label">${d.nowcast_quarter} GVA Estimate</div><div class="kpi-value serif">${fmt(nc.gva_meur)}</div><div class="kpi-sub mono">90% CI: [${fmt(nc.lower_90)} – ${fmt(nc.upper_90)}]</div></div>
    <div class="card"><div class="kpi-label">Model Precision</div><div class="mono" style="font-size:26px;margin-top:10px;font-weight:700">±€${Math.round(nc.rmse_meur)}M</div><div class="kpi-sub">${(nc.rmse_meur/nc.gva_meur*100).toFixed(1)}% of estimate</div></div>
    <div class="card"><div class="kpi-label">Annualized GDP</div><div class="mono" style="font-size:26px;margin-top:10px;font-weight:700">€${(nc.gdp_meur*4/1000).toFixed(1)}B</div><div class="kpi-sub">GVA × 1.08 × 4</div></div>
  </div>
  <div class="card fade"><h3 style="font-size:14px;font-weight:600;margin-bottom:4px">Quarterly GVA — Chow-Lin + Nowcast</h3><div class="chart-wrap"><canvas id="c-gva"></canvas></div></div>
  <div style="display:grid;grid-template-columns:260px 1fr;gap:14px" class="fade">
    <div class="card" style="text-align:center"><h3 style="font-size:13px;font-weight:600;margin-bottom:8px;text-align:left">Sector Mix</h3><div style="width:200px;height:200px;margin:0 auto"><canvas id="c-pie"></canvas></div></div>
    <div class="card"><h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Sectoral Decomposition</h3>
      <table><thead><tr><th>Sector</th><th>GVA</th><th>Weight</th><th>R²adj</th><th>RMSE</th><th>DW</th></tr></thead><tbody>${ss.map(([s,v])=>{const dd=diag[s]||{};return`<tr><td style="font-weight:500"><span class="dot" style="background:${C[s]}"></span>${L[s]}</td><td class="mono" style="font-size:12px">€${Math.round(v.point)}M</td><td class="mono" style="font-size:12px">${v.weight_pct}%</td><td class="mono" style="font-size:12px;color:${r2c(dd.r2_adj||0)}">${dd.r2_adj?.toFixed(3)||'—'}</td><td class="mono" style="font-size:12px">€${Math.round(dd.rmse||0)}M</td><td class="mono" style="font-size:12px;color:${dwc(dd.dw||0)}">${dd.dw?.toFixed(2)||'—'}</td></tr>`}).join('')}</tbody></table>
    </div>
  </div>`;

  const gQ=d.sector_quarterly?.gva_total_sectoral||{};
  const labs=[...Object.keys(gQ),d.nowcast_quarter],vals=[...Object.values(gQ),nc.gva_meur];
  const pr=labs.map((_,i)=>i===labs.length-1?6:0),pc=labs.map((_,i)=>i===labs.length-1?'#D4553A':'rgba(212,85,58,0.6)');
  allCharts.gva=new Chart(document.getElementById('c-gva'),{type:'line',data:{labels:labs,datasets:[{data:vals,borderColor:'#D4553A',backgroundColor:'rgba(212,85,58,0.08)',fill:true,tension:.3,pointRadius:pr,pointBackgroundColor:pc,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'€'+Math.round(c.parsed.y)+'M'}}},scales:{x:{ticks:{maxRotation:45,font:{size:10},color:'#9C9590'},grid:{display:false}},y:{ticks:{callback:v=>'€'+(v/1000).toFixed(1)+'B',font:{size:10},color:'#9C9590'},grid:{color:'#E2DCD4'}}}}});
  allCharts.pie=new Chart(document.getElementById('c-pie'),{type:'doughnut',data:{labels:ss.map(([s])=>L[s]),datasets:[{data:ss.map(([,v])=>v.point),backgroundColor:ss.map(([s])=>C[s]),borderColor:'#fff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+': €'+Math.round(c.parsed)+'M'}}}}});
}

function buildSectors(d){
  const diag=d.diagnostics,sec=d.sectors;let h='';
  for(const[s,dd]of Object.entries(diag)){const pt=sec[s]?.point||0,ft=(dd.features||[]).filter(f=>f!=='covid').join(', ');
    h+=`<div class="card sector-card fade" style="border-left-color:${C[s]}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4 style="font-size:14px;font-weight:600">${L[s]} <span class="mono" style="font-size:12px;color:var(--dim);font-weight:400">(${s})</span></h4><span class="mono" style="font-size:20px;font-weight:700;color:${C[s]}">€${Math.round(pt)}M</span></div><div class="sector-grid"><div><dt>R² adjusted</dt><dd class="mono" style="font-weight:600;color:${r2c(dd.r2_adj)}">${dd.r2_adj.toFixed(4)}</dd></div><div><dt>RMSE</dt><dd class="mono" style="font-weight:600">€${dd.rmse}M</dd></div><div><dt>Durbin-Watson</dt><dd class="mono" style="font-weight:600;color:${dwc(dd.dw||0)}">${dd.dw?.toFixed(3)||'—'}</dd></div><div><dt>Observations</dt><dd class="mono" style="font-weight:600">${dd.n}</dd></div><div><dt>Features</dt><dd class="mono" style="color:var(--muted)">${ft}</dd></div></div>${s==='203'?'<div class="warn-box">⚠ Low R² — building permits are a leading indicator (12-18mo lag), not contemporaneous with construction output.</div>':''}</div>`}
  document.getElementById('tab-sectors').innerHTML=h;
}

function buildIndicators(d){
  const ind=d.indicators||{};let h='',idx=0;
  for(const[k,ser]of Object.entries(ind)){h+=`<div class="card fade"><h3 style="font-size:14px;font-weight:600;margin-bottom:4px">${IL[k]||k}</h3><div class="chart-wrap chart-wrap-sm"><canvas id="ci${idx}"></canvas></div></div>`;idx++}
  document.getElementById('tab-indicators').innerHTML=h;
  idx=0;
  for(const[k,ser]of Object.entries(ind)){
    const labs=Object.keys(ser),vals=Object.values(ser),isR=k==='al_share'||k==='unemployment',col=IC[k]||'#D4553A';
    allCharts['i'+idx]=new Chart(document.getElementById('ci'+idx),{type:'line',data:{labels:labs,datasets:[{data:vals,borderColor:col,backgroundColor:col+'18',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>isR?(c.parsed.y*100).toFixed(1)+'%':c.parsed.y>10000?Math.round(c.parsed.y/1000)+'k':c.parsed.y.toFixed(1)}}},scales:{x:{ticks:{maxRotation:45,font:{size:9},color:'#9C9590',maxTicksLimit:12},grid:{display:false}},y:{ticks:{callback:isR?v=>(v*100).toFixed(0)+'%':undefined,font:{size:10},color:'#9C9590'},grid:{color:'#E2DCD4'}}}}});
    idx++}
}

function buildMethod(){
  document.getElementById('tab-method').innerHTML=`<div class="card fade"><h3 class="serif" style="font-size:22px;margin-bottom:16px">Methodology</h3><div style="font-size:14px;color:var(--muted);line-height:1.8;max-width:720px"><h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">1. Temporal Disaggregation</h4><p>Annual GVA by sector (INE 0014109 × 0014113) is disaggregated to quarterly frequency using the Chow-Lin (1971) method. Each sector uses an appropriate high-frequency interpolator: overnight stays for tourism and consultancy, housing transactions for real estate, building permits for construction, and linear trend for public administration.</p><h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">2. Bridge Equations</h4><p>Ridge-regularized regressions map quarterly indicators to quarterly sector GVA. Sector 304 (40% of GVA) uses overnight stays, RevPAR, and AL market share. Sector 307 uses housing transaction values. Sector 308 uses tourism proxies (r=0.93 correlation with total GVA growth). Sectors 309 and REST use trend models.</p><h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">3. Aggregation</h4><p>Sector nowcasts are summed to produce aggregate GVA. GDP is estimated as GVA × 1.08 (historical taxes-on-products ratio). Confidence intervals assume independent sector errors. Partial-quarter data is extrapolated using historical within-quarter seasonal patterns.</p><h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">4. Known Limitations</h4><p>Construction sector bridge has low R²adj (0.28) — building permits are a leading, not contemporaneous, indicator. Real estate GVA includes imputed rents (~70% of sector), which transactions cannot proxy. Low Durbin-Watson on trend-driven sectors suggests autocorrelated residuals and understated uncertainty. 2024 sector shares are extrapolated from 2023 (INE not yet published).</p><div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)"><p>Model: Algarve Nowcast v3 Sectoral · Chow-Lin ρ: 0.973–0.990 · Training: 32 quarters (2017–2024) · 6 sectors + COVID dummy · Ridge α=1.0</p><p style="margin-top:4px">INE codes: 0014109, 0014113, 0009808, 0009813, 0012098, 0012786, 0012136, 0000861/62</p></div></div></div>`;
}
</script>
</body>
</html>
