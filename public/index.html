<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nowcast do PIB do Algarve</title>
<meta name="description" content="Previsão em tempo real do PIB regional do Algarve, Portugal. Modelo de decomposição setorial com dados oficiais do INE.">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<style>
:root{--bg:#F7F3EE;--card:#FFF;--border:#E2DCD4;--text:#1A1A1A;--muted:#6B6560;--dim:#9C9590;--accent:#D4553A;--blue:#2563EB;--teal:#0F766E;--gold:#B8860B;--purple:#7C3AED;--forecast:#D4553A22}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Instrument Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',serif}.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:24px;margin-bottom:16px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:13px;font-weight:400;color:var(--muted);background:0;border:0;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit}
.tab.active{font-weight:600;color:var(--accent);border-bottom-color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:22px}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr!important}}
.kpi-main{border-left:4px solid var(--accent)}
.kpi-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.kpi-value{font-size:44px;color:var(--accent);margin-top:6px;line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 8px;text-align:left;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border)}
td{padding:9px 8px;border-bottom:1px solid var(--border)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.sector-card{border-left:3px solid var(--dim);margin-bottom:14px}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 20px;font-size:12px}
.sector-grid dt{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.warn-box{margin-top:12px;padding:10px 14px;background:#FEF3CD;border-radius:4px;font-size:12px;color:#856404}
.chart-wrap{position:relative;height:300px;margin-top:12px}.chart-wrap-sm{height:220px}
.legend{display:flex;gap:20px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-line{width:24px;height:3px;border-radius:2px}
.legend-dash{width:24px;height:0;border-top:3px dashed}
.hidden{display:none}
footer{margin-top:40px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeUp .4s ease-out both}
</style>
</head>
<body>
<header style="border-bottom:2px solid var(--text);padding:28px 0 18px;margin-bottom:28px">
  <div class="container" style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="serif" style="font-size:28px;font-weight:400;letter-spacing:-0.02em">Nowcast da Economia do Algarve</h1>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">Acompanhamento setorial do PIB · Região do Algarve, Portugal</p>
    </div>
    <div style="text-align:right">
      <div class="mono" style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em">Atualizado</div>
      <div class="mono" id="updated-date" style="font-size:13px;color:var(--muted)">—</div>
    </div>
  </div>
</header>
<div class="container">
  <nav class="tabs" id="nav-tabs">
    <button class="tab active" data-tab="overview">Nowcast</button>
    <button class="tab" data-tab="sectors">Setores</button>
    <button class="tab" data-tab="indicators">Indicadores</button>
    <button class="tab" data-tab="method">Metodologia</button>
  </nav>
  <div id="tab-overview"><div class="card" style="color:var(--muted)">A carregar dados…</div></div>
  <div id="tab-sectors" class="hidden"></div>
  <div id="tab-indicators" class="hidden"></div>
  <div id="tab-method" class="hidden"></div>
  <footer><span>Dados: INE (Instituto Nacional de Estatística) · Google Trends</span><span>Algarve Nowcast v3</span></footer>
</div>
<script>
const C={304:'#D4553A',309:'#2563EB',307:'#0F766E',203:'#B8860B',308:'#7C3AED',REST:'#9C9590'};
const L={304:'Comércio e Turismo',309:'Administração Pública',307:'Imobiliário',203:'Construção',308:'Consultoria',REST:'Outros Setores'};
const IL={nights:'Dormidas',revpar:'RevPAR (€/dormida)',al_share:'Quota AL',building_permits:'Licenças de Construção',airport_pax:'Passageiros Aeroporto (Faro)',housing_tx:'Transações Imobiliárias (€k)',unemployment:'Taxa de Desemprego (%)'};
const IC={nights:'#D4553A',revpar:'#0F766E',al_share:'#7C3AED',building_permits:'#B8860B',airport_pax:'#2563EB',housing_tx:'#0F766E',unemployment:'#D4553A'};
let allCharts={};

function fmt(v){return v>=1000?'€'+(v/1000).toFixed(2)+'B':'€'+Math.round(v)+'M'}
function r2c(v){return v>.8?'var(--teal)':v>.5?'var(--gold)':'var(--accent)'}
function dwc(v){return v>1.5?'var(--teal)':v>.8?'var(--gold)':'var(--accent)'}

document.getElementById('nav-tabs').addEventListener('click',function(e){
  if(!e.target.matches('.tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.classList.add('hidden'));
  document.getElementById('tab-'+e.target.dataset.tab).classList.remove('hidden');
  setTimeout(()=>Object.values(allCharts).forEach(c=>c.resize()),50);
});

fetch('./data.json')
.then(r=>{if(!r.ok)throw new Error('data.json: HTTP '+r.status);return r.json()})
.then(d=>{document.getElementById('updated-date').textContent=d.updated;buildOverview(d);buildSectors(d);buildIndicators(d);buildMethod()})
.catch(err=>{document.getElementById('tab-overview').innerHTML='<div class="card" style="color:var(--accent)"><h3>Erro</h3><p class="mono" style="margin-top:8px;font-size:13px">'+err.message+'</p></div>'});

function buildOverview(d){
  const nc=d.nowcast,sec=d.sectors,diag=d.diagnostics;
  const ss=Object.entries(sec).sort((a,b)=>b[1].point-a[1].point);

  // Build GVA series separating actual from forecast
  const gvaQ=d.gva_quarterly||{};
  const allLabels=Object.keys(gvaQ);
  const actualVals=[],forecastVals=[];
  allLabels.forEach(q=>{
    const entry=gvaQ[q];
    if(entry.type==='actual'){actualVals.push(entry.value);forecastVals.push(null)}
    else{
      // Bridge point: overlap last actual for continuity
      if(forecastVals.length>0&&forecastVals[forecastVals.length-1]===null){
        forecastVals[forecastVals.length-1]=actualVals[actualVals.length-1]}
      actualVals.push(null);forecastVals.push(entry.value)}
  });

  document.getElementById('tab-overview').innerHTML=`
  <div class="kpi-grid fade">
    <div class="card kpi-main"><div class="kpi-label">Estimativa VAB ${d.nowcast_quarter}</div><div class="kpi-value serif">${fmt(nc.gva_meur)}</div><div class="kpi-sub mono">IC 90%: [${fmt(nc.lower_90)} – ${fmt(nc.upper_90)}]</div></div>
    <div class="card"><div class="kpi-label">Precisão do Modelo</div><div class="mono" style="font-size:26px;margin-top:10px;font-weight:700">±€${Math.round(nc.rmse_meur)}M</div><div class="kpi-sub">${(nc.rmse_meur/nc.gva_meur*100).toFixed(1)}% da estimativa</div></div>
    <div class="card"><div class="kpi-label">PIB Anualizado</div><div class="mono" style="font-size:26px;margin-top:10px;font-weight:700">€${(nc.gdp_meur*4/1000).toFixed(1)}B</div><div class="kpi-sub">VAB × 1,08 × 4</div></div>
  </div>
  <div class="card fade"><h3 style="font-size:14px;font-weight:600;margin-bottom:4px">VAB Trimestral — Dados e Previsão</h3><div class="chart-wrap"><canvas id="c-gva"></canvas></div>
    <div class="legend"><span class="legend-item"><span class="legend-line" style="background:#2563EB"></span>Dados observados (Chow-Lin)</span><span class="legend-item"><span class="legend-dash" style="border-color:#D4553A"></span>Previsão do modelo</span></div>
  </div>
  <div style="display:grid;grid-template-columns:260px 1fr;gap:14px" class="fade two-col">
    <div class="card" style="text-align:center"><h3 style="font-size:13px;font-weight:600;margin-bottom:8px;text-align:left">Composição Setorial</h3><div style="width:200px;height:200px;margin:0 auto"><canvas id="c-pie"></canvas></div></div>
    <div class="card"><h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Decomposição Setorial</h3>
      <table><thead><tr><th>Setor</th><th>VAB</th><th>Peso</th><th>R²adj</th><th>RMSE</th><th>DW</th></tr></thead><tbody>${ss.map(([s,v])=>{const dd=diag[s]||{};return`<tr><td style="font-weight:500"><span class="dot" style="background:${C[s]}"></span>${L[s]}</td><td class="mono" style="font-size:12px">€${Math.round(v.point)}M</td><td class="mono" style="font-size:12px">${v.weight_pct}%</td><td class="mono" style="font-size:12px;color:${r2c(dd.r2_adj||0)}">${dd.r2_adj?.toFixed(3)||'—'}</td><td class="mono" style="font-size:12px">€${Math.round(dd.rmse||0)}M</td><td class="mono" style="font-size:12px;color:${dwc(dd.dw||0)}">${dd.dw?.toFixed(2)||'—'}</td></tr>`}).join('')}</tbody></table>
    </div>
  </div>`;

  // GVA chart: two datasets — actual (solid blue) + forecast (dashed red)
  allCharts.gva=new Chart(document.getElementById('c-gva'),{type:'line',data:{labels:allLabels,datasets:[
    {label:'Dados observados',data:actualVals,borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.06)',fill:true,tension:.3,pointRadius:0,borderWidth:2.5,spanGaps:false},
    {label:'Previsão',data:forecastVals,borderColor:'#D4553A',backgroundColor:'rgba(212,85,58,0.08)',fill:true,tension:.3,pointRadius:function(ctx){return ctx.dataIndex===forecastVals.length-1?6:2},pointBackgroundColor:'#D4553A',pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5,borderDash:[8,4],spanGaps:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const t=ctx.dataset.label;return t+': €'+Math.round(ctx.parsed.y)+'M'}}}},scales:{x:{ticks:{maxRotation:45,font:{size:10},color:'#9C9590'},grid:{display:false}},y:{ticks:{callback:v=>'€'+(v/1000).toFixed(1)+'B',font:{size:10},color:'#9C9590'},grid:{color:'#E2DCD4'}}}}});

  allCharts.pie=new Chart(document.getElementById('c-pie'),{type:'doughnut',data:{labels:ss.map(([s])=>L[s]),datasets:[{data:ss.map(([,v])=>v.point),backgroundColor:ss.map(([s])=>C[s]),borderColor:'#fff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+': €'+Math.round(c.parsed)+'M'}}}}});
}

function buildSectors(d){
  const diag=d.diagnostics,sec=d.sectors;let h='';
  for(const[s,dd]of Object.entries(diag)){const pt=sec[s]?.point||0,ft=(dd.features||[]).filter(f=>f!=='covid').join(', ');
    const featPT={'nights':'dormidas','revpar':'RevPAR','al_share':'quota AL','housing_tx':'transações imobiliárias','trend':'tendência','building_permits':'licenças de construção'};
    const ftPT=ft.split(', ').map(f=>featPT[f]||f).join(', ');
    h+=`<div class="card sector-card fade" style="border-left-color:${C[s]}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4 style="font-size:14px;font-weight:600">${L[s]} <span class="mono" style="font-size:12px;color:var(--dim);font-weight:400">(${s})</span></h4><span class="mono" style="font-size:20px;font-weight:700;color:${C[s]}">€${Math.round(pt)}M</span></div><div class="sector-grid"><div><dt>R² ajustado</dt><dd class="mono" style="font-weight:600;color:${r2c(dd.r2_adj)}">${dd.r2_adj.toFixed(4)}</dd></div><div><dt>RMSE</dt><dd class="mono" style="font-weight:600">€${dd.rmse}M</dd></div><div><dt>Durbin-Watson</dt><dd class="mono" style="font-weight:600;color:${dwc(dd.dw||0)}">${dd.dw?.toFixed(3)||'—'}</dd></div><div><dt>Observações</dt><dd class="mono" style="font-weight:600">${dd.n}</dd></div><div><dt>Variáveis</dt><dd class="mono" style="color:var(--muted)">${ftPT}</dd></div></div>${s==='203'?'<div class="warn-box">⚠ R² baixo — as licenças de construção são um indicador avançado (12-18 meses de desfasamento), não contemporâneo da produção.</div>':''}</div>`}
  document.getElementById('tab-sectors').innerHTML=h;
}

function buildIndicators(d){
  const ind=d.indicators||{};let h='',idx=0;
  for(const[k,ser]of Object.entries(ind)){h+=`<div class="card fade"><h3 style="font-size:14px;font-weight:600;margin-bottom:4px">${IL[k]||k}</h3><div class="chart-wrap chart-wrap-sm"><canvas id="ci${idx}"></canvas></div></div>`;idx++}
  document.getElementById('tab-indicators').innerHTML=h;
  idx=0;
  for(const[k,ser]of Object.entries(ind)){
    const labs=Object.keys(ser),vals=Object.values(ser),isR=k==='al_share'||k==='unemployment',col=IC[k]||'#D4553A';
    allCharts['i'+idx]=new Chart(document.getElementById('ci'+idx),{type:'line',data:{labels:labs,datasets:[{data:vals,borderColor:col,backgroundColor:col+'18',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>isR?(c.parsed.y*100).toFixed(1)+'%':c.parsed.y>10000?Math.round(c.parsed.y/1000)+'k':c.parsed.y.toFixed(1)}}},scales:{x:{ticks:{maxRotation:45,font:{size:9},color:'#9C9590',maxTicksLimit:12},grid:{display:false}},y:{ticks:{callback:isR?v=>(v*100).toFixed(0)+'%':undefined,font:{size:10},color:'#9C9590'},grid:{color:'#E2DCD4'}}}}});
    idx++}
}

function buildMethod(){
  document.getElementById('tab-method').innerHTML=`<div class="card fade"><h3 class="serif" style="font-size:22px;margin-bottom:16px">Metodologia</h3><div style="font-size:14px;color:var(--muted);line-height:1.8;max-width:720px">
<h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">1. Desagregação Temporal</h4>
<p>O VAB anual por setor (INE 0014109 × 0014113) é desagregado para frequência trimestral usando o método de Chow-Lin (1971). Cada setor utiliza um interpolador de alta frequência apropriado: dormidas para turismo e consultoria, transações imobiliárias para o setor imobiliário, licenças para construção, e tendência linear para a administração pública.</p>

<h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">2. Equações Ponte</h4>
<p>Regressões Ridge regularizadas mapeiam indicadores trimestrais para o VAB setorial trimestral. O setor 304 (40% do VAB) utiliza dormidas, RevPAR e quota de mercado AL. O setor 307 utiliza o valor das transações imobiliárias. O setor 308 utiliza proxies de turismo (r=0,93 com o crescimento do VAB total). Os setores 309 e restantes utilizam modelos de tendência.</p>

<h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">3. Agregação</h4>
<p>As previsões setoriais são somadas para produzir o VAB agregado. O PIB é estimado como VAB × 1,08 (rácio histórico de impostos sobre produtos). Os intervalos de confiança assumem erros setoriais independentes. Dados de trimestres incompletos são extrapolados usando padrões sazonais históricos.</p>

<h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">4. Distinção Dados vs. Previsão</h4>
<p><strong style="color:#2563EB">Dados observados (2017–2024):</strong> VAB trimestral estimado por Chow-Lin a partir de dados anuais do INE. Estes valores são consistentes com as contas regionais publicadas.</p>
<p><strong style="color:#D4553A">Previsão do modelo (2025–2026):</strong> Estimativas produzidas pelas equações ponte usando indicadores mensais/trimestrais disponíveis (dormidas, receitas, licenças, transações). O VAB anual de 2025 ainda não foi publicado pelo INE.</p>

<h4 style="font-weight:600;color:var(--text);margin-top:20px;margin-bottom:6px;font-size:15px">5. Limitações Conhecidas</h4>
<p>O setor da construção tem R²adj baixo (0,28) — as licenças são um indicador avançado. O VAB imobiliário inclui rendas imputadas (~70% do setor). Durbin-Watson baixo nos setores com tendência sugere autocorrelação residual. As quotas setoriais de 2024 são extrapoladas de 2023.</p>

<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)">
<p>Modelo: Algarve Nowcast v3 Setorial · Chow-Lin ρ: 0,973–0,990 · Treino: 32 trimestres (2017–2024) · 6 setores + dummy COVID · Ridge α=1,0</p>
<p style="margin-top:4px">Códigos INE: 0014109, 0014113, 0009808, 0009813, 0012098, 0012786, 0012136, 0000861/62</p></div></div></div>`;
}
</script>
</body>
</html>
